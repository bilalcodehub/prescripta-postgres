services:
  postgres:
    image: postgres:16-alpine
    container_name: prescripta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-prescripta_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prescripta_secret}
      POSTGRES_DB: ${POSTGRES_DB:-prescripta_db}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "11001:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prescripta_admin} -d ${POSTGRES_DB:-prescripta_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    shm_size: 256mb
